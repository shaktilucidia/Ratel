apiVersion: apps/v1
kind: Deployment

metadata:
  name: ratel-backend-users

spec:
  replicas: 2
  selector:
    matchLabels:
      app: ratel-backend-users

  template:
    metadata:
      labels:
        app: ratel-backend-users
    spec:
      containers:
      - name: ratel-backend-users
        image: ratel_backend_users:latest
        imagePullPolicy: IfNotPresent

        env:
          - name: ASPNETCORE_ENVIRONMENT
            value: Development

        ports:
        - containerPort: 9000

        startupProbe:
          httpGet:
            path: /api/users/health/is_started
            port: 9000
          periodSeconds: 5
          failureThreshold: 30

        readinessProbe:
          httpGet:
            path: /api/users/health/is_ready
            port: 9000
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /api/users/health/is_alive
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: ratel-backend-users

spec:
  type: NodePort

  selector:
    app: ratel-backend-users

  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30000
