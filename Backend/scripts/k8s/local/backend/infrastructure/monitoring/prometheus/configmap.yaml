apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config
  namespace: ratel-monitoring

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:

      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: ratel-backend-users
        metrics_path: /metrics

        static_configs:
          - targets:
              - ratel-backend-users.ratel-backend.svc.cluster.local:9000
