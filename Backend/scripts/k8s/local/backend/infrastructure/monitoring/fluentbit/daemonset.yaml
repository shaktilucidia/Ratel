apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: fluent-bit
  namespace: ratel-monitoring

spec:
  selector:
    matchLabels:
      app: fluent-bit

  template:
    metadata:
      labels:
        app: fluent-bit

    spec:
      serviceAccountName: fluent-bit

      containers:
        - name: fluent-bit

          image: fluent/fluent-bit:latest

          volumeMounts:
            - name: fluentbit-config
              mountPath: /fluent-bit/etc

            - name: varlog
              mountPath: /var/log

            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true

          resources:
            requests:
              cpu: 50m
              memory: 64Mi

            limits:
              cpu: 200m
              memory: 256Mi

      volumes:
        - name: fluentbit-config
          configMap:
            name: fluent-bit-config

        - name: varlog
          hostPath:
            path: /var/log

        - name: containers
          hostPath:
            path: /var/lib/docker/containers
