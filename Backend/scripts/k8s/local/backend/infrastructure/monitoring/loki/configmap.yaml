apiVersion: v1
kind: ConfigMap

metadata:
  name: loki-config
  namespace: ratel-monitoring

data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki

      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules

      replication_factor: 1

      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      filesystem:
        directory: /loki/chunks

    limits_config:
      allow_structured_metadata: true

    ruler:
      storage:
        type: local

      rule_path: /loki/rules-temp

      alertmanager_url: http://localhost:9093

      ring:
        kvstore:
          store: inmemory

      enable_api: true
