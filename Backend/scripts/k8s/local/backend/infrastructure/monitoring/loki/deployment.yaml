apiVersion: apps/v1
kind: Deployment

metadata:
  name: loki
  namespace: ratel-monitoring

spec:
  replicas: 1

  selector:
    matchLabels:
      app: loki

  template:
    metadata:
      labels:
        app: loki

    spec:
      containers:
        - name: loki

          image: grafana/loki:latest

          args:
            - -config.file=/etc/loki/loki.yaml

          ports:
            - containerPort: 3100

          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki

            - name: loki-storage
              mountPath: /loki

          readinessProbe:
            httpGet:
              path: /ready
              port: 3100

            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /ready
              port: 3100

            initialDelaySeconds: 30
            periodSeconds: 30

      volumes:
        - name: loki-config
          configMap:
            name: loki-config

        - name: loki-storage
          persistentVolumeClaim:
            claimName: loki-storage
