apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ratel-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000

          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-user

            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-password

          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources

            - name: grafana-storage
              mountPath: /var/lib/grafana

      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources

        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-storage
