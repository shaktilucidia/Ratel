apiVersion: v1
kind: ConfigMap

metadata:
  name: grafana-dashboards-ratel
  namespace: ratel-monitoring

data:
  ratel-users-overview.json: |
    {
      "title": "Ratel Backend Users - Overview",
      "uid": "ratel-users-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "title": "Registration rate",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "rate(ratel_users_registration_attempts_total[5m])",
              "legendFormat": "{{is_successful}}"
            }
          ]
        },
        {
          "title": "Registration latency p95",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(ratel_users_registration_duration_milliseconds_bucket[5m]))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "title": "Registration latency p99",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(ratel_users_registration_duration_milliseconds_bucket[5m]))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "title": "Total registrations",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "sum(ratel_users_registration_attempts_total)"
            }
          ]
        }
      ]
    }

  ratel-users-registration.json: |
    {
      "title": "Ratel Users Registration",
      "uid": "ratel-users-registration",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "title": "Registration duration p50",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(ratel_users_registration_duration_milliseconds_bucket[5m]))"
            }
          ]
        },
        {
          "title": "Registration duration p95",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(ratel_users_registration_duration_milliseconds_bucket[5m]))"
            }
          ]
        },
        {
          "title": "Registration duration p99",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(ratel_users_registration_duration_milliseconds_bucket[5m]))"
            }
          ]
        },
        {
          "title": "Registration duration distribution",
          "type": "heatmap",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "sum(rate(ratel_users_registration_duration_milliseconds_bucket[5m])) by (le)"
            }
          ]
        },
        {
          "title": "Successful registrations",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "sum(ratel_users_registration_attempts_total{is_successful=\"true\"})"
            }
          ]
        },
        {
          "title": "Failed registrations",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "sum(ratel_users_registration_attempts_total{is_successful=\"false\"})"
            }
          ]
        }
      ]
    }

  ratel-users-runtime.json: |
    {
      "title": "Ratel Backend Users - Runtime",
      "uid": "ratel-users-runtime",
      "schemaVersion": 39,
      "version": 3,
      "refresh": "10s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "title": "HTTP requests per second",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "sum(rate({\"http.server.request.duration_seconds_count\"}[5m]))",
              "legendFormat": "requests/sec"
            }
          ]
        },
        {
          "id": 2,
          "title": "HTTP latency p95",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate({\"http.server.request.duration_seconds_bucket\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 3,
          "title": "HTTP latency p99",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate({\"http.server.request.duration_seconds_bucket\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 4,
          "title": "HTTP 5xx rate",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "sum(rate({\"http.server.request.duration_seconds_count\", \"http.response.status_code\"=~\"5..\"}[5m]))",
              "legendFormat": "5xx/sec"
            }
          ]
        },
        {
          "id": 5,
          "title": "ASP.NET Identity user creation latency p95",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate({\"aspnetcore.identity.user.create.duration_seconds_bucket\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 6,
          "title": "Kestrel active connections",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "{\"kestrel.active_connections\"}",
              "legendFormat": "connections"
            }
          ]
        },
        {
          "id": 7,
          "title": "Kestrel connection duration p95",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-datasource-uid"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate({\"kestrel.connection.duration_seconds_bucket\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        }
      ],
      "templating": {
        "list": []
      },
      "annotations": {
        "list": []
      }
    }
